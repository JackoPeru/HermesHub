<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orange Particles 3D</title>
  <style>
    :root {
      --bg: #060402;
      --panel: rgba(14, 8, 4, 0.78);
      --panel-strong: rgba(28, 14, 6, 0.92);
      --line: rgba(255, 145, 42, 0.34);
      --line-strong: rgba(255, 170, 70, 0.72);
      --text: #ffe1bd;
      --muted: #c18b5d;
      --accent: #ff8a18;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: "Segoe UI", sans-serif;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      position: relative;
    }

    #c {
      display: block;
      width: 100%;
      height: 100%;
    }

    #editToggle {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 5;
      height: 36px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font: 600 12px/1 "Segoe UI", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    #editToggle:hover,
    #editor button:hover {
      border-color: var(--line-strong);
      color: #fff7ed;
    }

    #editor {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: none;
      pointer-events: none;
    }

    #editor.active {
      display: block;
    }

    #editCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      pointer-events: auto;
    }

    #tools {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 6;
      width: min(360px, calc(100vw - 32px));
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      color: var(--text);
      box-shadow: 0 18px 50px rgba(0,0,0,0.38);
      backdrop-filter: blur(12px);
      pointer-events: auto;
    }

    #tools h1 {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    #editor button {
      height: 30px;
      padding: 0 10px;
      border: 1px solid rgba(255, 145, 42, 0.25);
      border-radius: 6px;
      background: rgba(255, 127, 20, 0.09);
      color: var(--text);
      font: 600 11px/1 "Segoe UI", sans-serif;
      cursor: pointer;
    }

    #editor button.active {
      border-color: var(--line-strong);
      background: rgba(255, 127, 20, 0.28);
      color: #fff8ee;
    }

    #brush,
    #brightness,
    #zoom {
      flex: 1;
      accent-color: var(--accent);
    }

    #countLabel {
      min-width: 92px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    #jsonBox {
      width: 100%;
      height: 62px;
      box-sizing: border-box;
      resize: none;
      margin-top: 8px;
      border: 1px solid rgba(255, 145, 42, 0.22);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.28);
      color: var(--text);
      font: 11px/1.35 Consolas, monospace;
      outline: none;
    }

    #hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <button id="editToggle" type="button">Editor</button>
  <div id="editor">
    <canvas id="editCanvas"></canvas>
    <div id="tools">
      <h1>Shape editor</h1>
      <div class="row">
        <button id="drawBtn" class="active" type="button">Disegna</button>
        <button id="eraseBtn" type="button">Gomma</button>
        <button id="doneBtn" type="button">Chiudi</button>
      </div>
      <div class="row">
        <button id="particleModeBtn" class="active" type="button">Particelle</button>
        <button id="lineModeBtn" type="button">Tratto unico</button>
      </div>
      <div class="row">
        <button class="refBtn active" data-ref="0" type="button">Front</button>
        <button class="refBtn" data-ref="1" type="button">3/4</button>
        <button class="refBtn" data-ref="2" type="button">Right</button>
        <button class="refBtn" data-ref="3" type="button">Left</button>
        <button class="refBtn" data-ref="4" type="button">Back</button>
      </div>
      <div class="row">
        <span id="brushValue">Tratto 0.35</span>
        <input id="brush" type="range" min="0.03" max="8" step="0.01" value="0.35">
        <span id="countLabel">0 punti</span>
      </div>
      <div class="row">
        <span id="brightnessValue">Luce 100%</span>
        <input id="brightness" type="range" min="0.15" max="2.5" step="0.05" value="1">
      </div>
      <div class="row">
        <span id="zoomValue">Zoom 100%</span>
        <input id="zoom" type="range" min="0.5" max="18" step="0.05" value="1">
        <button id="fitBtn" type="button">Fit</button>
      </div>
      <div class="row">
        <button id="saveBtn" type="button">Salva</button>
        <button id="saveFileBtn" type="button">Salva file</button>
        <button id="loadFileBtn" type="button">Carica file</button>
        <button id="resetBtn" type="button">Reset Hermes</button>
        <button id="clearBtn" type="button">Svuota</button>
      </div>
      <div class="row">
        <button id="exportBtn" type="button">Export</button>
        <button id="importBtn" type="button">Import</button>
      </div>
      <textarea id="jsonBox" spellcheck="false"></textarea>
      <input id="shapeFileInput" type="file" accept="application/json,.json" hidden>
      <div id="hint">Scegli prospettiva e tipo tratto. I punti vengono creati sul piano 3D attivo.</div>
    </div>
  </div>
</div>
<script src="three.min.js"></script>
<script>
(function(){
  const canvas = document.getElementById('c');
  const stage = document.getElementById('stage');
  const editToggle = document.getElementById('editToggle');
  const editor = document.getElementById('editor');
  const editCanvas = document.getElementById('editCanvas');
  const editCtx = editCanvas.getContext('2d');
  const drawBtn = document.getElementById('drawBtn');
  const eraseBtn = document.getElementById('eraseBtn');
  const doneBtn = document.getElementById('doneBtn');
  const particleModeBtn = document.getElementById('particleModeBtn');
  const lineModeBtn = document.getElementById('lineModeBtn');
  const refButtons = Array.from(document.querySelectorAll('.refBtn'));
  const brushInput = document.getElementById('brush');
  const brushValue = document.getElementById('brushValue');
  const brightnessInput = document.getElementById('brightness');
  const brightnessValue = document.getElementById('brightnessValue');
  const zoomInput = document.getElementById('zoom');
  const zoomValue = document.getElementById('zoomValue');
  const fitBtn = document.getElementById('fitBtn');
  const countLabel = document.getElementById('countLabel');
  const saveBtn = document.getElementById('saveBtn');
  const saveFileBtn = document.getElementById('saveFileBtn');
  const loadFileBtn = document.getElementById('loadFileBtn');
  const resetBtn = document.getElementById('resetBtn');
  const clearBtn = document.getElementById('clearBtn');
  const exportBtn = document.getElementById('exportBtn');
  const importBtn = document.getElementById('importBtn');
  const jsonBox = document.getElementById('jsonBox');
  const shapeFileInput = document.getElementById('shapeFileInput');
  const storageKey = 'orange-particles-hermes-shape-v2';
  const bundledShapePath = 'hermes-particles-shape.json';
  const isAndroidRuntime = /Android/i.test(navigator.userAgent);
  const mobileStrokeLimit = 180;
  let lineGroupBuilt = false;
  let lineGroupBuilding = false;

  function showBootError(message){
    const box = document.createElement('div');
    box.style.cssText = 'position:fixed;inset:0;display:grid;place-items:center;background:#050505;color:#ff8500;font:13px system-ui,sans-serif;padding:24px;text-align:center;z-index:99;';
    box.textContent = 'Hermes WebGL non avviato: ' + message;
    document.body.appendChild(box);
  }

  window.addEventListener('error', e=>showBootError(e.message || 'errore runtime'));
  window.addEventListener('unhandledrejection', e=>showBootError((e.reason && e.reason.message) || 'promise rejected'));
  if(!window.THREE){
    showBootError('three.min.js non caricato');
    return;
  }

  let renderer;
  try {
    renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
  } catch(err) {
    showBootError((err && err.message) || 'WebGLRenderer fallito');
    return;
  }
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  function viewportWidth(){
    return Math.max(1, stage.clientWidth || window.innerWidth || document.documentElement.clientWidth || screen.width || 360);
  }

  function viewportHeight(){
    return Math.max(1, stage.clientHeight || window.innerHeight || document.documentElement.clientHeight || screen.height || 640);
  }

  const w = viewportWidth();
  const h = viewportHeight();
  renderer.setSize(w, h);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x060402);
  scene.fog = new THREE.FogExp2(0x060402, 0.014);

  const camera = new THREE.PerspectiveCamera(60, w/h, 0.1, 220);
  camera.position.set(0, 0, 70);

  const COUNT = 3600;
  const BOUND = 40;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(COUNT * 3);
  const free = new Float32Array(COUNT * 3);
  const target = new Float32Array(COUNT * 3);
  const vel = new Float32Array(COUNT * 3);
  const sizes = new Float32Array(COUNT);
  const glows = new Float32Array(COUNT);
  const phases = new Float32Array(COUNT);

  const bundledHermesShape = loadBundledShape();
  const defaultHermesPoints = bundledHermesShape ? bundledHermesShape.points : buildHermesShape(COUNT);
  const defaultHermesStrokes = bundledHermesShape ? bundledHermesShape.strokes : [];
  const savedShape = loadSavedShape();
  let editorPoints = savedShape ? savedShape.points : clonePoints(defaultHermesPoints);
  let editorStrokes = savedShape ? savedShape.strokes : cloneStrokes(defaultHermesStrokes);

  for(let i = 0; i < COUNT; i++){
    const i3 = i * 3;
    free[i3]   = (Math.random()-0.5)*80;
    free[i3+1] = (Math.random()-0.5)*80;
    free[i3+2] = (Math.random()-0.5)*80;
    pos[i3] = free[i3];
    pos[i3+1] = free[i3+1];
    pos[i3+2] = free[i3+2];
    vel[i3]   = (Math.random()-0.5)*0.012;
    vel[i3+1] = (Math.random()-0.5)*0.012;
    vel[i3+2] = (Math.random()-0.5)*0.012;
    sizes[i]  = 0.45 + Math.random()*1.7;
    glows[i] = 1;
    phases[i] = Math.random()*Math.PI*2;
  }
  applyEditorPoints(editorPoints);

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('glow', new THREE.BufferAttribute(glows, 1));

  const tex = (()=>{
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const cx = c.getContext('2d');
    const g = cx.createRadialGradient(32,32,0, 32,32,32);
    g.addColorStop(0,   'rgba(255,230,150,1)');
    g.addColorStop(0.2, 'rgba(255,150,36,0.92)');
    g.addColorStop(0.52,'rgba(255,88,8,0.42)');
    g.addColorStop(1,   'rgba(255,60,0,0)');
    cx.fillStyle = g;
    cx.fillRect(0,0,64,64);
    return new THREE.CanvasTexture(c);
  })();

  const mat = new THREE.ShaderMaterial({
    uniforms: { map: {value: tex}, time: {value:0}, morph: {value:0} },
    vertexShader:`
      attribute float size;
      attribute float glow;
      uniform float time;
      uniform float morph;
      varying float vAlpha;
      varying float vGlow;
      void main(){
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        float pulse = 0.86 + sin(time * 2.0 + position.x * 0.25 + position.y * 0.13) * 0.14;
        gl_PointSize = size * pulse * (360.0 / -mv.z) * (1.0 + morph * 0.35);
        gl_Position = projectionMatrix * mv;
        float d = length(position) / 48.0;
        vAlpha = clamp(1.0 - d, 0.24, 1.0);
        vGlow = glow;
      }
    `,
    fragmentShader:`
      uniform sampler2D map;
      uniform float morph;
      varying float vAlpha;
      varying float vGlow;
      void main(){
        vec4 tex = texture2D(map, gl_PointCoord);
        float glow = mix(1.0, clamp(vGlow, 0.08, 2.8), morph);
        vec3 color = tex.rgb * mix(1.0, 0.65 + glow * 0.45, morph);
        gl_FragColor = vec4(color, tex.a * vAlpha * glow);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  const lineGroup = new THREE.Group();
  scene.add(lineGroup);
  const referenceGroup = new THREE.Group();
  scene.add(referenceGroup);
  referenceGroup.visible = false;

  const referenceConfigs = [
    {label:'Front', yaw:0, src:'Hermes particelle/ChatGPT Image 27 mag 2026, 14_11_55.png'},
    {label:'3/4', yaw:-Math.PI/4, src:'Hermes particelle/ChatGPT Image 27 mag 2026, 14_12_03.png'},
    {label:'Right', yaw:-Math.PI/2, src:'Hermes particelle/ChatGPT Image 27 mag 2026, 14_12_09.png'},
    {label:'Left', yaw:Math.PI/2, src:'Hermes particelle/ChatGPT Image 27 mag 2026, 14_12_15.png'},
    {label:'Back', yaw:Math.PI, src:'Hermes particelle/ChatGPT Image 27 mag 2026, 14_12_23.png'}
  ];
  let activeReference = 0;
  const referenceImages = referenceConfigs.map(config=>{
    const img = new Image();
    img.onload = ()=>drawEditor();
    img.src = config.src;
    return img;
  });
  buildReferencePlanes();
  setTimeout(()=>ensureLineGroupBuilt(), isAndroidRuntime ? 900 : 80);

  let isDragging = false, prevX = 0, prevY = 0;
  let rotX = 0, rotY = 0;
  let velX = 0.0003, velY = 0.0005;
  let morphTarget = new URLSearchParams(window.location.search).has('assembled') ? 1 : 0;
  let morph = morphTarget;
  let t = 0;
  let editorActive = false;
  let editTool = 'draw';
  let editMode = 'particles';
  let editDown = false;
  let lastEditPoint = null;
  let currentStroke = null;
  let editScale = 1;
  let editBaseScale = 1;
  let editZoom = 1;
  let editCx = 0;
  let editCy = 0;
  let editPanX = 0;
  let editPanY = 0;
  let panDown = false;
  const editCenterYRatio = 0.52;

  stage.addEventListener('mousedown', e=>{
    if(editorActive) return;
    isDragging=true; prevX=e.clientX; prevY=e.clientY;
  });
  window.addEventListener('mouseup', ()=>{ isDragging=false; editDown=false; lastEditPoint=null; });
  window.addEventListener('mousemove', e=>{
    if(editorActive) return;
    if(!isDragging) return;
    const dx=e.clientX-prevX, dy=e.clientY-prevY;
    velY = dx*0.002; velX = dy*0.002;
    rotY += dx*0.004; rotX += dy*0.004;
    prevX=e.clientX; prevY=e.clientY;
  });

  window.addEventListener('keydown', e=>{
    if(e.code === 'KeyE' && !e.repeat){
      e.preventDefault();
      setEditorActive(!editorActive);
      return;
    }
    if(e.code === 'Space' && !editorActive){
      e.preventDefault();
      morphTarget = morphTarget > 0.5 ? 0 : 1;
    }
  });

  let lastTouchToggle = 0;
  stage.addEventListener('touchend', e=>{
    if(editorActive) return;
    if(e.target && e.target.closest && e.target.closest('button, input, textarea, #tools')) return;
    e.preventDefault();
    const now = Date.now();
    if(now - lastTouchToggle > 260){
      morphTarget = morphTarget > 0.5 ? 0 : 1;
      lastTouchToggle = now;
    }
  }, {passive:false});

  editToggle.addEventListener('click', ()=>setEditorActive(!editorActive));
  doneBtn.addEventListener('click', ()=>setEditorActive(false));
  drawBtn.addEventListener('click', ()=>setTool('draw'));
  eraseBtn.addEventListener('click', ()=>setTool('erase'));
  particleModeBtn.addEventListener('click', ()=>setMode('particles'));
  lineModeBtn.addEventListener('click', ()=>setMode('line'));
  refButtons.forEach(button=>{
    button.addEventListener('click', ()=>setActiveReference(+button.dataset.ref));
  });
  brushInput.addEventListener('input', ()=>{
    updateEditorLabels();
    drawEditor();
  });
  brightnessInput.addEventListener('input', ()=>{
    updateEditorLabels();
    drawEditor();
  });
  zoomInput.addEventListener('input', ()=>{
    editZoom = +zoomInput.value;
    updateEditorTransform();
    updateEditorLabels();
    drawEditor();
  });
  fitBtn.addEventListener('click', ()=>{
    editZoom = 1;
    editPanX = 0;
    editPanY = 0;
    zoomInput.value = editZoom;
    updateEditorTransform();
    updateEditorLabels();
    drawEditor();
  });
  saveBtn.addEventListener('click', savePoints);
  saveFileBtn.addEventListener('click', saveShapeToFile);
  loadFileBtn.addEventListener('click', ()=>shapeFileInput.click());
  shapeFileInput.addEventListener('change', loadShapeFromFile);
  resetBtn.addEventListener('click', ()=>{
    editorPoints = clonePoints(defaultHermesPoints);
    editorStrokes = cloneStrokes(defaultHermesStrokes);
    applyEditorPoints(editorPoints);
    rebuildLineGroup();
    lineGroupBuilt = true;
    drawEditor();
  });
  clearBtn.addEventListener('click', ()=>{
    editorPoints = [];
    editorStrokes = [];
    applyEditorPoints(editorPoints);
    rebuildLineGroup();
    lineGroupBuilt = true;
    drawEditor();
  });
  exportBtn.addEventListener('click', ()=>{
    jsonBox.value = JSON.stringify(serializeShape());
    jsonBox.select();
  });
  importBtn.addEventListener('click', ()=>{
    try {
      const imported = normalizeShape(JSON.parse(jsonBox.value));
      if(!imported) return;
      editorPoints = imported.points;
      editorStrokes = imported.strokes;
      applyEditorPoints(editorPoints);
      rebuildLineGroup();
      lineGroupBuilt = true;
      drawEditor();
    } catch(err) {
      jsonBox.value = 'JSON non valido';
    }
  });

  editCanvas.addEventListener('pointerdown', e=>{
    if(!editorActive) return;
    editDown = true;
    panDown = e.button === 1 || e.altKey;
    if(panDown) {
      lastEditPoint = {x:e.clientX, y:e.clientY};
      e.preventDefault();
      return;
    }
    if(editTool === 'draw' && editMode === 'line'){
      currentStroke = {points: [], glow: +brightnessInput.value, width: +brushInput.value, ref: activeReference};
      editorStrokes.push(currentStroke);
    }
    editCanvas.setPointerCapture(e.pointerId);
    handleEditPointer(e);
  });
  editCanvas.addEventListener('pointermove', e=>{
    if(!editorActive || !editDown) return;
    if(panDown){
      editPanX += e.clientX - lastEditPoint.x;
      editPanY += e.clientY - lastEditPoint.y;
      lastEditPoint = {x:e.clientX, y:e.clientY};
      updateEditorTransform();
      drawEditor();
      return;
    }
    handleEditPointer(e);
  });
  editCanvas.addEventListener('pointerup', e=>{
    editDown = false;
    panDown = false;
    currentStroke = null;
    lastEditPoint = null;
    rebuildLineGroup();
    lineGroupBuilt = true;
    if(editCanvas.hasPointerCapture(e.pointerId)){
      editCanvas.releasePointerCapture(e.pointerId);
    }
  });
  editCanvas.addEventListener('wheel', e=>{
    if(!editorActive) return;
    e.preventDefault();
    const rect = editCanvas.getBoundingClientRect();
    const before = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    editZoom = Math.max(0.5, Math.min(18, editZoom * factor));
    zoomInput.value = editZoom;
    updateEditorTransform();
    const after = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    editPanX += (after.x - before.x) * editScale;
    editPanY -= (after.y - before.y) * editScale;
    updateEditorTransform();
    updateEditorLabels();
    drawEditor();
  }, { passive:false });

  function setTool(tool){
    editTool = tool;
    drawBtn.classList.toggle('active', tool === 'draw');
    eraseBtn.classList.toggle('active', tool === 'erase');
    drawEditor();
  }

  function setMode(mode){
    editMode = mode;
    particleModeBtn.classList.toggle('active', mode === 'particles');
    lineModeBtn.classList.toggle('active', mode === 'line');
    drawEditor();
  }

  function setActiveReference(index){
    activeReference = Math.max(0, Math.min(referenceConfigs.length - 1, index));
    refButtons.forEach((button, i)=>button.classList.toggle('active', i === activeReference));
    updateReferencePlaneOpacity();
    drawEditor();
  }

  function setEditorActive(active){
    editorActive = active;
    editor.classList.toggle('active', active);
    editToggle.classList.toggle('active', active);
    editToggle.textContent = active ? 'Chiudi' : 'Editor';
    if(active){
      morphTarget = 1;
      rotX = 0;
      rotY = 0;
      velX = 0;
      velY = 0;
      resizeEditor();
      drawEditor();
    }
  }

  function handleEditPointer(event){
    const rect = editCanvas.getBoundingClientRect();
    const sx = event.clientX - rect.left;
    const sy = event.clientY - rect.top;
    const point = screenToWorld(sx, sy);

    if(editTool === 'erase'){
      eraseAt(point);
      lastEditPoint = point;
      return;
    }

    if(editMode === 'line'){
      drawLinePoint(point);
      lastEditPoint = point;
      return;
    }

    drawStrokePoint(point, lastEditPoint);
    lastEditPoint = point;
  }

  function drawLinePoint(point){
    if(!currentStroke){
      currentStroke = {points: [], glow: +brightnessInput.value, width: +brushInput.value, ref: activeReference};
      editorStrokes.push(currentStroke);
    }
    const prev = currentStroke.points[currentStroke.points.length - 1];
    const minDist = Math.max(0.025, +brushInput.value * 0.22);
    if(prev){
      const prevLocal = worldToReferenceLocal(prev);
      if(Math.hypot(point.x - prevLocal.x, point.y - prevLocal.y) < minDist) return;
    }
    const world = localToWorldPoint(point);
    currentStroke.points.push({x: world.x, y: world.y, z: world.z});
    drawEditor();
  }

  function drawStrokePoint(point, previous){
    const brush = +brushInput.value;
    if(previous){
      const dist = Math.hypot(point.x - previous.x, point.y - previous.y);
      const steps = Math.max(1, Math.ceil(dist / Math.max(0.015, brush * 0.16)));
      for(let i=1;i<=steps;i++){
        const k = i / steps;
        addDrawnPoint({
          x: previous.x + (point.x - previous.x) * k,
          y: previous.y + (point.y - previous.y) * k
        }, brush);
      }
    } else {
      addDrawnPoint(point, brush);
    }
    applyEditorPoints(editorPoints);
    drawEditor();
  }

  function addDrawnPoint(point, brush){
    const amount = Math.max(1, Math.round(brush * 1.15));
    for(let i=0;i<amount;i++){
      const a = Math.random() * Math.PI * 2;
      const r = Math.sqrt(Math.random()) * brush * 0.12;
      const world = localToWorldPoint({
        x: point.x + Math.cos(a) * r,
        y: point.y + Math.sin(a) * r,
        z: 0
      });
      editorPoints.push({
        x: world.x,
        y: world.y,
        z: world.z + (Math.random() - 0.5) * 2.6,
        glow: +brightnessInput.value,
        width: brush,
        ref: activeReference
      });
    }
  }

  function eraseAt(point){
    const radius = Math.max(0.06, +brushInput.value * 1.15);
    const r2 = radius * radius;
    editorPoints = editorPoints.filter(p=>{
      const local = worldToReferenceLocal(p);
      const dx = local.x - point.x;
      const dy = local.y - point.y;
      return dx*dx + dy*dy > r2;
    });
    editorStrokes = editorStrokes.map(stroke=>({
      glow: stroke.glow,
      width: stroke.width,
      ref: stroke.ref,
      points: stroke.points.filter(p=>{
        const local = worldToReferenceLocal(p);
        const dx = local.x - point.x;
        const dy = local.y - point.y;
        return dx*dx + dy*dy > r2;
      })
    })).filter(stroke=>stroke.points.length > 1);
    applyEditorPoints(editorPoints);
    rebuildLineGroup();
    lineGroupBuilt = true;
    drawEditor();
  }

  function resizeEditor(){
    editCanvas.width = stage.clientWidth;
    editCanvas.height = stage.clientHeight;
    editBaseScale = Math.min(editCanvas.width / 104, editCanvas.height / 88);
    updateEditorTransform();
  }

  function updateEditorTransform(){
    editScale = editBaseScale * editZoom;
    editCx = editCanvas.width * 0.5 + editPanX;
    editCy = editCanvas.height * editCenterYRatio + editPanY;
  }

  function updateEditorLabels(){
    brushValue.textContent = 'Tratto ' + (+brushInput.value).toFixed(2).replace(/\.?0+$/, '');
    brightnessValue.textContent = 'Luce ' + Math.round(+brightnessInput.value * 100) + '%';
    zoomValue.textContent = 'Zoom ' + Math.round(editZoom * 100) + '%';
  }

  function pixelsPerWorldUnit(){
    const fov = camera.fov * Math.PI / 180;
    return stage.clientHeight / (2 * Math.tan(fov / 2) * camera.position.z);
  }

  function applyEditorSceneTransform(){
    const pxPerWorld = pixelsPerWorldUnit();
    pts.scale.set(editZoom, editZoom, editZoom);
    pts.position.x = editPanX / pxPerWorld;
    pts.position.y = -(editPanY + stage.clientHeight * (editCenterYRatio - 0.5)) / pxPerWorld;
    pts.position.z = 0;
    lineGroup.scale.copy(pts.scale);
    lineGroup.position.copy(pts.position);
    referenceGroup.scale.copy(pts.scale);
    referenceGroup.position.copy(pts.position);
  }

  function resetSceneTransform(){
    pts.scale.set(1, 1, 1);
    pts.position.set(0, 0, 0);
    lineGroup.scale.set(1, 1, 1);
    lineGroup.position.set(0, 0, 0);
    referenceGroup.scale.set(1, 1, 1);
    referenceGroup.position.set(0, 0, 0);
  }

  function worldToScreen(p){
    return {
      x: editCx + p.x * editScale,
      y: editCy - p.y * editScale
    };
  }

  function screenToWorld(x, y){
    return {
      x: (x - editCx) / editScale,
      y: (editCy - y) / editScale,
      z: 0
    };
  }

  function localToWorldPoint(point){
    const yaw = referenceConfigs[activeReference].yaw;
    const cos = Math.cos(yaw);
    const sin = Math.sin(yaw);
    return {
      x: point.x * cos + (point.z || 0) * sin,
      y: point.y,
      z: -point.x * sin + (point.z || 0) * cos
    };
  }

  function worldToReferenceLocal(point){
    const yaw = -referenceConfigs[activeReference].yaw;
    const cos = Math.cos(yaw);
    const sin = Math.sin(yaw);
    return {
      x: point.x * cos + (point.z || 0) * sin,
      y: point.y,
      z: -point.x * sin + (point.z || 0) * cos
    };
  }

  function drawEditor(){
    if(!editorActive) return;
    updateEditorLabels();
    editCtx.clearRect(0, 0, editCanvas.width, editCanvas.height);
    editCtx.fillStyle = 'rgba(6,4,2,0.24)';
    editCtx.fillRect(0, 0, editCanvas.width, editCanvas.height);

    const activeImage = referenceImages[activeReference];
    if(activeImage.complete && activeImage.naturalWidth){
      const imgWorldH = 91;
      const imgWorldW = imgWorldH * (activeImage.naturalWidth / activeImage.naturalHeight);
      const topLeft = worldToScreen({x:-imgWorldW / 2, y:imgWorldH / 2});
      const bottomRight = worldToScreen({x:imgWorldW / 2, y:-imgWorldH / 2});
      editCtx.save();
      editCtx.globalAlpha = 0.13;
      editCtx.drawImage(
        activeImage,
        topLeft.x,
        topLeft.y,
        bottomRight.x - topLeft.x,
        bottomRight.y - topLeft.y
      );
      editCtx.restore();
    }

    editCtx.strokeStyle = 'rgba(255,145,42,0.18)';
    editCtx.lineWidth = 1;
    editCtx.beginPath();
    editCtx.moveTo(editCx, 0);
    editCtx.lineTo(editCx, editCanvas.height);
    editCtx.moveTo(0, editCy);
    editCtx.lineTo(editCanvas.width, editCy);
    editCtx.stroke();

    for(let i=0;i<editorStrokes.length;i++){
      const stroke = editorStrokes[i];
      if(stroke.points.length < 2) continue;
      const glow = Math.max(0.12, Math.min(2.5, stroke.glow || 1));
      editCtx.save();
      editCtx.lineCap = 'round';
      editCtx.lineJoin = 'round';
      editCtx.shadowColor = 'rgba(255,120,20,' + Math.min(1, 0.28 + glow * 0.25) + ')';
      editCtx.shadowBlur = Math.max(2, (stroke.width || 0.35) * editScale * 0.9);
      editCtx.strokeStyle = 'rgba(255,132,22,' + Math.min(1, 0.28 + glow * 0.36) + ')';
      editCtx.lineWidth = Math.max(1, (stroke.width || 0.35) * editScale * 0.34);
      editCtx.beginPath();
      const first = worldToScreen(worldToReferenceLocal(stroke.points[0]));
      editCtx.moveTo(first.x, first.y);
      for(let j=1;j<stroke.points.length;j++){
        const p = worldToScreen(worldToReferenceLocal(stroke.points[j]));
        editCtx.lineTo(p.x, p.y);
      }
      editCtx.stroke();
      editCtx.restore();
    }

    for(let i=0;i<editorPoints.length;i++){
      const local = worldToReferenceLocal(editorPoints[i]);
      const s = worldToScreen(local);
      const glow = Math.max(0.12, Math.min(2.5, editorPoints[i].glow || 1));
      const radius = Math.max(0.6, Math.min(2.4, (editorPoints[i].width || 0.35) * editScale * 0.08));
      editCtx.fillStyle = 'rgba(255,133,23,' + Math.min(1, 0.25 + glow * 0.42) + ')';
      editCtx.beginPath();
      editCtx.arc(s.x, s.y, radius, 0, Math.PI * 2);
      editCtx.fill();
    }

    countLabel.textContent = editorPoints.length + ' punti, ' + editorStrokes.length + ' tratti';
  }

  function applyEditorPoints(points){
    const source = points.length ? points : [{x:0,y:0,z:0}];
    const shuffled = source.slice();
    for(let i=shuffled.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      const tmp = shuffled[i];
      shuffled[i] = shuffled[j];
      shuffled[j] = tmp;
    }
    for(let i = 0; i < COUNT; i++){
      const i3 = i * 3;
      const p = shuffled[i % shuffled.length];
      const width = Math.max(0.03, Math.min(8, p.width || 0.35));
      const xyJitter = Math.max(0.006, width * 0.045);
      const zJitter = Math.max(0.18, width * 0.52);
      target[i3] = p.x + (Math.random()-0.5)*xyJitter;
      target[i3+1] = p.y + (Math.random()-0.5)*xyJitter;
      target[i3+2] = (p.z || 0) + (Math.random()-0.5)*zJitter;
      sizes[i] = Math.max(0.08, Math.min(2.2, 0.12 + width * 0.42));
      glows[i] = Math.max(0.08, Math.min(2.8, p.glow || 1));
    }
    if(geo.attributes.size) geo.attributes.size.needsUpdate = true;
    if(geo.attributes.glow) geo.attributes.glow.needsUpdate = true;
    countLabel.textContent = points.length + ' punti, ' + editorStrokes.length + ' tratti';
  }

  function savePoints(){
    localStorage.setItem(storageKey, JSON.stringify(serializeShape()));
  }

  async function saveShapeToFile(){
    const json = JSON.stringify(serializeShape(), null, 2);
    const filename = 'hermes-particles-shape.json';

    if(window.showSaveFilePicker){
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{
            description: 'Hermes particle shape',
            accept: {'application/json': ['.json']}
          }]
        });
        const writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        jsonBox.value = 'Salvato su file: ' + handle.name;
        return;
      } catch(err) {
        if(err && err.name === 'AbortError') return;
      }
    }

    const blob = new Blob([json], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
    jsonBox.value = 'Download creato: ' + filename;
  }

  function loadShapeFromFile(){
    const file = shapeFileInput.files && shapeFileInput.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = ()=>{
      try {
        const imported = normalizeShape(JSON.parse(reader.result));
        if(!imported) throw new Error('Formato non valido');
        editorPoints = imported.points;
        editorStrokes = imported.strokes;
        applyEditorPoints(editorPoints);
        rebuildLineGroup();
        lineGroupBuilt = true;
        savePoints();
        drawEditor();
        jsonBox.value = 'Caricato da file: ' + file.name;
      } catch(err) {
        jsonBox.value = 'File JSON non valido';
      } finally {
        shapeFileInput.value = '';
      }
    };
    reader.readAsText(file);
  }

  function serializeShape(){
    return {
      points: editorPoints.map(p=>({
        x: round(p.x),
        y: round(p.y),
        z: round(p.z || 0),
        glow: round(p.glow || 1),
        width: round(p.width || 0.35),
        ref: Number.isFinite(p.ref) ? p.ref : 0
      })),
      strokes: editorStrokes.map(stroke=>({
        glow: round(stroke.glow || 1),
        width: round(stroke.width || 0.35),
        ref: Number.isFinite(stroke.ref) ? stroke.ref : 0,
        points: stroke.points.map(p=>({
          x: round(p.x),
          y: round(p.y),
          z: round(p.z || 0)
        }))
      })).filter(stroke=>stroke.points.length > 1)
    };
  }

  function normalizeShape(raw){
    if(Array.isArray(raw)){
      return {
        points: raw
          .filter(p=>Number.isFinite(p.x) && Number.isFinite(p.y))
          .map(p=>({x:+p.x, y:+p.y, z:Number.isFinite(p.z) ? +p.z : 0, glow:Number.isFinite(p.glow) ? +p.glow : 1, width:Number.isFinite(p.width) ? +p.width : 0.35, ref:Number.isFinite(p.ref) ? +p.ref : 0})),
        strokes: []
      };
    }
    if(!raw || typeof raw !== 'object') return null;
    return {
      points: Array.isArray(raw.points) ? raw.points
        .filter(p=>Number.isFinite(p.x) && Number.isFinite(p.y))
        .map(p=>({x:+p.x, y:+p.y, z:Number.isFinite(p.z) ? +p.z : 0, glow:Number.isFinite(p.glow) ? +p.glow : 1, width:Number.isFinite(p.width) ? +p.width : 0.35, ref:Number.isFinite(p.ref) ? +p.ref : 0})) : [],
      strokes: Array.isArray(raw.strokes) ? raw.strokes.map(stroke=>({
        glow: Number.isFinite(stroke.glow) ? +stroke.glow : 1,
        width: Number.isFinite(stroke.width) ? +stroke.width : 0.35,
        ref: Number.isFinite(stroke.ref) ? +stroke.ref : 0,
        points: Array.isArray(stroke.points) ? stroke.points
          .filter(p=>Number.isFinite(p.x) && Number.isFinite(p.y))
          .map(p=>({x:+p.x, y:+p.y, z:Number.isFinite(p.z) ? +p.z : 0})) : []
      })).filter(stroke=>stroke.points.length > 1) : []
    };
  }

  function loadSavedShape(){
    try {
      const raw = localStorage.getItem(storageKey);
      if(!raw) return null;
      const shape = normalizeShape(JSON.parse(raw));
      if(!shape || (!shape.points.length && !shape.strokes.length)) return null;
      return shape;
    } catch(err) {
      return null;
    }
  }

  function loadBundledShape(){
    try {
      const request = new XMLHttpRequest();
      request.open('GET', bundledShapePath, false);
      request.overrideMimeType('application/json');
      request.send(null);
      if(request.status && request.status >= 400) return null;
      const shape = normalizeShape(JSON.parse(request.responseText));
      if(!shape || (!shape.points.length && !shape.strokes.length)) return null;
      return shape;
    } catch(err) {
      return null;
    }
  }

  function buildReferencePlanes(){
    const loader = new THREE.TextureLoader();
    referenceConfigs.forEach((config, index)=>{
      loader.load(encodeURI(config.src), texture=>{
        const image = texture.image;
        const height = 91;
        const width = height * (image.width / image.height);
        const geometry = new THREE.PlaneGeometry(width, height);
        const material = new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          opacity: index === 0 ? 0.2 : 0.07,
          side: THREE.DoubleSide,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        const plane = new THREE.Mesh(geometry, material);
        plane.rotation.y = config.yaw;
        plane.userData.refIndex = index;
        referenceGroup.add(plane);
        updateReferencePlaneOpacity();
      });
    });
  }

  function updateReferencePlaneOpacity(){
    referenceGroup.children.forEach(plane=>{
      plane.material.opacity = plane.userData.refIndex === activeReference ? 0.2 : 0.055;
    });
  }

  function rebuildLineGroup(){
    while(lineGroup.children.length){
      const child = lineGroup.children.pop();
      if(child.geometry) child.geometry.dispose();
      if(child.material) child.material.dispose();
    }

    if(isAndroidRuntime){
      rebuildMobileLineGroup();
      return;
    }

    for(let i=0;i<editorStrokes.length;i++){
      const stroke = editorStrokes[i];
      if(stroke.points.length < 2) continue;
      const curvePoints = stroke.points.map(p=>new THREE.Vector3(p.x, p.y, p.z || 0));
      const yaw = referenceConfigs[stroke.ref || 0] ? referenceConfigs[stroke.ref || 0].yaw : 0;
      const normal = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
      const segments = Math.min(420, Math.max(16, stroke.points.length * 3));
      const radius = Math.max(0.035, (stroke.width || 0.35) * 0.045);
      const glow = Math.max(0.1, Math.min(2.8, stroke.glow || 1));

      const depthLayers = [
        {offset: -radius * 8.5, radius: radius * 1.9, opacity: 0.08 + glow * 0.035, color: 0xff4f05},
        {offset: -radius * 3.2, radius: radius * 1.35, opacity: 0.12 + glow * 0.045, color: 0xff6a0a},
        {offset: 0, radius: radius, opacity: 0.34 + glow * 0.28, color: 0xff8a18},
        {offset: radius * 3.2, radius: radius * 1.35, opacity: 0.12 + glow * 0.045, color: 0xff6a0a},
        {offset: radius * 8.5, radius: radius * 1.9, opacity: 0.08 + glow * 0.035, color: 0xff4f05}
      ];

      depthLayers.forEach(layer=>{
        const shifted = curvePoints.map(p=>p.clone().addScaledVector(normal, layer.offset));
        const curve = new THREE.CatmullRomCurve3(shifted);
        const geometry = new THREE.TubeGeometry(curve, segments, layer.radius, 6, false);
        const material = new THREE.MeshBasicMaterial({
          color: layer.color,
          transparent: true,
          opacity: Math.min(1, layer.opacity),
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });
        material.userData.baseOpacity = material.opacity;
        lineGroup.add(new THREE.Mesh(geometry, material));
      });

      const haloCurve = new THREE.CatmullRomCurve3(curvePoints);
      const haloGeometry = new THREE.TubeGeometry(haloCurve, segments, radius * 4.8, 6, false);
      const haloMaterial = new THREE.MeshBasicMaterial({
        color: 0xff5f08,
        transparent: true,
        opacity: Math.min(0.34, 0.055 + glow * 0.065),
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      haloMaterial.userData.baseOpacity = haloMaterial.opacity;
      lineGroup.add(new THREE.Mesh(haloGeometry, haloMaterial));

      const sparkleCount = Math.min(900, Math.max(24, stroke.points.length * 3));
      const sparklePositions = new Float32Array(sparkleCount * 3);
      for(let j=0;j<sparkleCount;j++){
        const base = haloCurve.getPoint(j / Math.max(1, sparkleCount - 1));
        const spread = radius * (4 + Math.random() * 10);
        const ySpread = radius * (Math.random() - 0.5) * 8;
        base.addScaledVector(normal, (Math.random() - 0.5) * spread);
        base.y += ySpread;
        const j3 = j * 3;
        sparklePositions[j3] = base.x;
        sparklePositions[j3 + 1] = base.y;
        sparklePositions[j3 + 2] = base.z;
      }
      const sparkleGeometry = new THREE.BufferGeometry();
      sparkleGeometry.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));
      const sparkleMaterial = new THREE.PointsMaterial({
        color: 0xff8a18,
        map: tex,
        size: Math.max(0.24, radius * 9),
        sizeAttenuation: true,
        transparent: true,
        opacity: Math.min(0.5, 0.09 + glow * 0.11),
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      sparkleMaterial.userData.baseOpacity = sparkleMaterial.opacity;
      lineGroup.add(new THREE.Points(sparkleGeometry, sparkleMaterial));
    }
  }

  function ensureLineGroupBuilt(){
    if(lineGroupBuilt || lineGroupBuilding) return;
    lineGroupBuilding = true;
    setTimeout(()=>{
      rebuildLineGroup();
      lineGroupBuilt = true;
      lineGroupBuilding = false;
    }, 0);
  }

  function selectRenderableStrokes(){
    if(!isAndroidRuntime || editorStrokes.length <= mobileStrokeLimit) return editorStrokes;
    const selected = [];
    const step = editorStrokes.length / mobileStrokeLimit;
    for(let i=0;i<mobileStrokeLimit;i++){
      selected.push(editorStrokes[Math.floor(i * step)]);
    }
    return selected;
  }

  function rebuildMobileLineGroup(){
    const strokes = selectRenderableStrokes();
    const layers = [
      {offset:-0.34, opacity:0.12, color:0xff4f05},
      {offset:0, opacity:0.54, color:0xff9a19},
      {offset:0.34, opacity:0.12, color:0xff4f05}
    ];

    layers.forEach(layer=>{
      const vertices = [];
      strokes.forEach(stroke=>{
        if(!stroke || !stroke.points || stroke.points.length < 2) return;
        const yaw = referenceConfigs[stroke.ref || 0] ? referenceConfigs[stroke.ref || 0].yaw : 0;
        const nx = Math.sin(yaw);
        const nz = Math.cos(yaw);
        const radius = Math.max(0.035, (stroke.width || 0.35) * 0.045);
        const shift = layer.offset * radius * 8.5;
        for(let i=1;i<stroke.points.length;i++){
          const a = stroke.points[i - 1];
          const b = stroke.points[i];
          vertices.push(
            a.x + nx * shift, a.y, (a.z || 0) + nz * shift,
            b.x + nx * shift, b.y, (b.z || 0) + nz * shift
          );
        }
      });
      if(!vertices.length) return;
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      const material = new THREE.LineBasicMaterial({
        color: layer.color,
        transparent: true,
        opacity: layer.opacity,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      material.userData.baseOpacity = material.opacity;
      lineGroup.add(new THREE.LineSegments(geometry, material));
    });
  }

  function updateLineOpacity(value){
    lineGroup.traverse(child=>{
      if(child.material && child.material.userData){
        child.material.opacity = (child.material.userData.baseOpacity || 0) * value;
      }
    });
  }

  function smoothstep(edge0, edge1, value){
    const x = Math.max(0, Math.min(1, (value - edge0) / (edge1 - edge0)));
    return x * x * (3 - 2 * x);
  }

  function clonePoints(points){
    return points.map(p=>({x:p.x, y:p.y, z:p.z || 0, glow:p.glow || 1, width:p.width || 0.35, ref:p.ref || 0}));
  }

  function cloneStrokes(strokes){
    return strokes.map(stroke=>({
      glow: stroke.glow || 1,
      width: stroke.width || 0.35,
      ref: stroke.ref || 0,
      points: stroke.points.map(p=>({x:p.x, y:p.y, z:p.z || 0}))
    }));
  }

  function round(value){
    return Math.round(value * 100) / 100;
  }

  function addPoint(list, x, y, z, repeats){
    for(let i=0;i<repeats;i++){
      list.push({x:x, y:y, z:z + (Math.random()-0.5)*1.6, glow:1, width:0.7, ref:0});
    }
  }

  function addLine(list, x1, y1, x2, y2, n, z, repeats){
    for(let i=0;i<n;i++){
      const k = i/(n-1 || 1);
      addPoint(list, x1+(x2-x1)*k, y1+(y2-y1)*k, z, repeats);
    }
  }

  function addEllipse(list, cx, cy, rx, ry, n, start, end, z, repeats){
    for(let i=0;i<n;i++){
      const k = i/(n-1 || 1);
      const a = start + (end-start)*k;
      addPoint(list, cx + Math.cos(a)*rx, cy + Math.sin(a)*ry, z, repeats);
    }
  }

  function addBezier(list, p0, p1, p2, p3, n, z, repeats){
    for(let i=0;i<n;i++){
      const k = i/(n-1 || 1);
      const ik = 1-k;
      const x = ik*ik*ik*p0.x + 3*ik*ik*k*p1.x + 3*ik*k*k*p2.x + k*k*k*p3.x;
      const y = ik*ik*ik*p0.y + 3*ik*ik*k*p1.y + 3*ik*k*k*p2.y + k*k*k*p3.y;
      addPoint(list, x, y, z, repeats);
    }
  }

  function mirrorWing(list, side){
    const s = side;
    addBezier(list, {x:s*18,y:15}, {x:s*28,y:28}, {x:s*35,y:19}, {x:s*31,y:8}, 44, 0, 2);
    addBezier(list, {x:s*20,y:12}, {x:s*31,y:20}, {x:s*35,y:8}, {x:s*24,y:1}, 36, 0, 2);
    addBezier(list, {x:s*22,y:8}, {x:s*32,y:13}, {x:s*32,y:1}, {x:s*23,y:-4}, 34, 0, 2);
    addBezier(list, {x:s*22,y:3}, {x:s*31,y:6}, {x:s*29,y:-5}, {x:s*21,y:-9}, 32, 0, 2);
    addBezier(list, {x:s*20,y:-2}, {x:s*29,y:0}, {x:s*25,y:-10}, {x:s*17,y:-13}, 30, 0, 2);
    addLine(list, s*20, 12, s*31, 8, 18, 0, 1);
    addLine(list, s*21, 7, s*30, 2, 18, 0, 1);
    addLine(list, s*21, 2, s*27, -5, 18, 0, 1);
    addLine(list, s*19, -2, s*23, -10, 16, 0, 1);
  }

  function buildHermesShape(count){
    const list = [];
    addEllipse(list, 0, -7, 10.5, 14.5, 150, 0, Math.PI*2, 0, 2);
    addEllipse(list, 0, 12.5, 15.5, 9, 110, Math.PI*0.05, Math.PI*0.95, 0, 3);
    addEllipse(list, 0, 8.5, 21, 3.1, 120, Math.PI*0.02, Math.PI*0.98, 0, 3);
    addLine(list, -18, 8, 18, 8, 100, 0, 2);
    addLine(list, 0, 21, 0, 9, 42, 0, 2);
    addEllipse(list, 0, 22.2, 2.4, 2.2, 26, Math.PI*0.12, Math.PI*0.88, 0, 2);
    mirrorWing(list, -1);
    mirrorWing(list, 1);
    addEllipse(list, -4.5, -4.6, 3.1, 1.2, 34, 0, Math.PI*2, 1.2, 2);
    addEllipse(list, 4.5, -4.6, 3.1, 1.2, 34, 0, Math.PI*2, 1.2, 2);
    addEllipse(list, -4.5, -4.6, 0.8, 0.8, 14, 0, Math.PI*2, 1.4, 1);
    addEllipse(list, 4.5, -4.6, 0.8, 0.8, 14, 0, Math.PI*2, 1.4, 1);
    addBezier(list, {x:-7.5,y:-1.6}, {x:-5,y:0.8}, {x:-2.5,y:1.0}, {x:-1.2,y:0.2}, 24, 0.8, 1);
    addBezier(list, {x:7.5,y:-1.6}, {x:5,y:0.8}, {x:2.5,y:1.0}, {x:1.2,y:0.2}, 24, 0.8, 1);
    addLine(list, 0, -3, -1.4, -9, 34, 1.5, 2);
    addLine(list, 0, -3, 1.4, -9, 34, 1.5, 2);
    addEllipse(list, 0, -10.2, 2.8, 1.0, 24, Math.PI*0.1, Math.PI*0.9, 1.3, 2);
    addEllipse(list, 0, -15.2, 4.2, 1.2, 38, Math.PI*0.08, Math.PI*0.92, 1, 2);
    addLine(list, -5.2, -17.2, 5.2, -17.2, 36, 1, 1);
    addLine(list, -6.8, -22, -7.8, -34, 46, -0.4, 2);
    addLine(list, 6.8, -22, 7.8, -34, 46, -0.4, 2);
    addEllipse(list, 0, -40, 20, 7, 100, Math.PI*0.08, Math.PI*0.92, -1.4, 2);
    addLine(list, -19, -37, -7, -30, 44, -1, 1);
    addLine(list, 19, -37, 7, -30, 44, -1, 1);
    while(list.length < count){
      const a = Math.random()*Math.PI*2;
      const r = Math.sqrt(Math.random());
      addPoint(list, Math.cos(a)*10*r, -7 + Math.sin(a)*14*r, (Math.random()-0.5)*4, 1);
    }
    for(let i=list.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      const tmp = list[i];
      list[i] = list[j];
      list[j] = tmp;
    }
    return list;
  }

  function animate(){
    requestAnimationFrame(animate);
    t += 0.008;
    mat.uniforms.time.value = t;
    const morphSpeed = morphTarget > morph ? 0.014 : 0.032;
    morph += (morphTarget - morph) * morphSpeed;
    const eased = morph*morph*morph*(morph*(morph*6 - 15) + 10);
    mat.uniforms.morph.value = eased;

    const posArr = geo.attributes.position.array;
    for(let i=0;i<COUNT;i++){
      const i3=i*3;
      free[i3]   += vel[i3];
      free[i3+1] += vel[i3+1];
      free[i3+2] += vel[i3+2];
      vel[i3]   += (Math.random()-0.5)*0.0008;
      vel[i3+1] += (Math.random()-0.5)*0.0008;
      vel[i3+2] += (Math.random()-0.5)*0.0008;
      const spd = Math.sqrt(vel[i3]**2+vel[i3+1]**2+vel[i3+2]**2);
      if(spd>0.018){vel[i3]*=0.97;vel[i3+1]*=0.97;vel[i3+2]*=0.97;}
      if(Math.abs(free[i3])>BOUND)   vel[i3]   *= -1;
      if(Math.abs(free[i3+1])>BOUND) vel[i3+1] *= -1;
      if(Math.abs(free[i3+2])>BOUND) vel[i3+2] *= -1;

      const assembleTrail = Math.sin((1 - eased) * Math.PI) * 2.2;
      const shimmer = Math.sin(t*2.4 + phases[i]) * (0.22 + assembleTrail) * eased;
      posArr[i3]   = free[i3]   * (1-eased) + target[i3]   * eased;
      posArr[i3+1] = free[i3+1] * (1-eased) + target[i3+1] * eased;
      posArr[i3+2] = free[i3+2] * (1-eased) + (target[i3+2] + shimmer) * eased;
    }
    geo.attributes.position.needsUpdate = true;

    if(editorActive){
      applyEditorSceneTransform();
      pts.visible = false;
      lineGroup.visible = false;
      referenceGroup.visible = true;
      pts.rotation.x = 0;
      pts.rotation.y = 0;
      lineGroup.rotation.x = 0;
      lineGroup.rotation.y = 0;
      referenceGroup.rotation.x = 0;
      referenceGroup.rotation.y = 0;
    } else {
      resetSceneTransform();
      const lineReveal = smoothstep(0.94, 0.998, eased);
      if(lineReveal > 0.001) ensureLineGroupBuilt();
      pts.visible = true;
      lineGroup.visible = lineReveal > 0.001 && lineGroupBuilt;
      referenceGroup.visible = false;
      if(!isDragging){ velX*=0.96; velY*=0.96; rotX+=velX; rotY+=velY; }
      pts.rotation.x = rotX + (1-eased) * t*0.018;
      pts.rotation.y = rotY + (1-eased) * t*0.026;
      lineGroup.rotation.copy(pts.rotation);
      const lineFloat = lineReveal;
      lineGroup.position.x = Math.sin(t * 0.73) * 0.16 * lineFloat;
      lineGroup.position.y = Math.cos(t * 0.61) * 0.12 * lineFloat;
      lineGroup.position.z = Math.sin(t * 0.49) * 0.22 * lineFloat;
      const lineScale = 1 + Math.sin(t * 0.55) * 0.004 * lineFloat;
      lineGroup.scale.set(lineScale, lineScale, lineScale);
      updateLineOpacity(lineReveal * (0.94 + Math.sin(t * 1.25) * 0.06));
    }

    renderer.render(scene, camera);
  }
  animate();

  function onResize(){
    const nw = viewportWidth();
    const nh = viewportHeight();
    camera.aspect=nw/nh; camera.updateProjectionMatrix();
    renderer.setSize(nw,nh);
    if(editorActive){
      resizeEditor();
      drawEditor();
    }
  }
  window.addEventListener('resize', onResize);
  requestAnimationFrame(onResize);
  setTimeout(onResize, 80);
  setTimeout(onResize, 350);
  setTimeout(onResize, 1000);

  if(new URLSearchParams(window.location.search).has('editor')){
    setEditorActive(true);
  }
})();
</script>
