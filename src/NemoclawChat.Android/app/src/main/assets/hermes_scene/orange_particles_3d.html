<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Hermes Voice Stars</title>
  <style>
    html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#000; }
    canvas { display:block; width:100%; height:100%; }
  </style>
</head>
<body>
<script src="./three.min.js"></script>
<script>
(() => {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.1, 100);
  camera.position.z = 7;
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
  renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  const count = 1200;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const idle = [];
  const sphere = [];
  const phase = [];
  const speed = [];
  const colorA = new THREE.Color(0xffffff);
  const colorB = new THREE.Color(0xff8a18);

  for (let i = 0; i < count; i++) {
    const ix = (Math.random() - 0.5) * 14;
    const iy = (Math.random() - 0.5) * 8;
    const iz = (Math.random() - 0.5) * 10;
    const u = Math.random();
    const v = Math.random();
    const theta = Math.PI * 2 * u;
    const phi = Math.acos(2 * v - 1);
    const r = 1.9 + Math.random() * 0.18;
    idle.push(ix, iy, iz);
    sphere.push(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    phase.push(Math.random() * Math.PI * 2);
    speed.push(0.25 + Math.random() * 1.1);
    positions[i * 3] = ix;
    positions[i * 3 + 1] = iy;
    positions[i * 3 + 2] = iz;
    const c = Math.random() > 0.78 ? colorB : colorA;
    colors[i * 3] = c.r;
    colors[i * 3 + 1] = c.g;
    colors[i * 3 + 2] = c.b;
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
  const material = new THREE.PointsMaterial({
    size: 0.035,
    vertexColors: true,
    transparent: true,
    opacity: 0.92,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  const points = new THREE.Points(geometry, material);
  scene.add(points);

  let target = 0;
  let assembly = 0;
  window.setHermesSpeaking = value => { target = value ? 1 : 0; };
  document.body.addEventListener("click", () => { target = target > 0.5 ? 0 : 1; });

  function resize() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  }
  addEventListener("resize", resize);

  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    assembly += (target - assembly) * (target ? 0.075 : 0.045);
    const eased = assembly * assembly * (3 - 2 * assembly);
    for (let i = 0; i < count; i++) {
      const p = i * 3;
      const wobble = Math.sin(t * speed[i] + phase[i]);
      positions[p] = idle[p] + wobble * 0.12 + (sphere[p] - idle[p]) * eased;
      positions[p + 1] = idle[p + 1] + Math.cos(t * speed[i] * 0.72 + phase[i]) * 0.1 + (sphere[p + 1] - idle[p + 1]) * eased;
      positions[p + 2] = idle[p + 2] + Math.sin(t * speed[i] * 0.41 + phase[i]) * 0.18 + (sphere[p + 2] - idle[p + 2]) * eased;
    }
    geometry.attributes.position.needsUpdate = true;
    points.rotation.y = t * (0.03 + eased * 0.18);
    points.rotation.x = Math.sin(t * 0.17) * 0.08;
    material.size = 0.032 + eased * 0.018;
    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
